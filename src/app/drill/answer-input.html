<div class="flex flex-col gap-2">
  <textarea
    rows="4"
    placeholder="Type your answer…"
    class="w-full resize-none rounded bg-neutral-900 p-3 font-sans text-neutral-100
           disabled:opacity-40"
    [disabled]="!enabled()"
    [value]="draft()"
    (input)="draft.set($any($event.target).value)"
  ></textarea>
  <button
    type="button"
    class="self-end rounded bg-accent px-4 py-2 font-mono text-sm text-neutral-950
           disabled:opacity-40"
    [disabled]="!enabled()"
    (click)="submit()"
  >
    Send
  </button>
</div>
